spring.application.name=xno-backend

spring.datasource.url=${XNO_DB_URL}
spring.datasource.username=${XNO_DB_USERNAME}
spring.datasource.password=${XNO_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${API_KEY}
cloudinary.api-secret=${API_SECRET}

spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=3000000000000
spring.app.jwtCookieName=xnoBackend

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB